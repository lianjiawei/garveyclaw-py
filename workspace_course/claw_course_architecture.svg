<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Claw 课程版机器人架构图</title>
  <desc id="desc">展示 Telegram 入口、Agent 层、会话与记忆、工具层、定时任务调度与数据存储之间关系的 SVG 架构图。</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef6f4"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#204a66"/>
      <stop offset="100%" stop-color="#2d6b66"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#10324a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#47667d"/>
    </marker>
    <style>
      .title { font: 700 30px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #ffffff; }
      .subtitle { font: 400 15px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #d9eef2; }
      .section-title { font: 700 22px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #153348; }
      .box-title { font: 700 18px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #163246; }
      .box-text { font: 400 14px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #36556a; }
      .small-text { font: 400 13px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #527288; }
      .edge-label { font: 600 13px "Microsoft YaHei", "PingFang SC", sans-serif; fill: #4b6478; }
      .panel { fill: #ffffff; stroke: #d3e3eb; stroke-width: 2; rx: 28; filter: url(#shadow); }
      .box-blue { fill: #f4f9fd; stroke: #90b6cc; stroke-width: 2; rx: 20; }
      .box-green { fill: #f3fbf8; stroke: #8bbfaa; stroke-width: 2; rx: 20; }
      .box-yellow { fill: #fffaf0; stroke: #d8bb73; stroke-width: 2; rx: 20; }
      .box-red { fill: #fff6f4; stroke: #d39a8f; stroke-width: 2; rx: 20; }
      .box-purple { fill: #f8f4fb; stroke: #b19bcf; stroke-width: 2; rx: 20; }
      .edge { stroke: #47667d; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .edge-dashed { stroke: #6f8798; stroke-width: 2.5; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>

  <rect x="40" y="28" width="1520" height="96" rx="24" fill="url(#header)"/>
  <text x="72" y="78" class="title">Claw 课程版机器人架构图</text>
  <text x="72" y="106" class="subtitle">单文件课程版如何把 Telegram、Claude Agent、Session、Memory、Tools、Scheduler 串成一个完整系统</text>

  <rect x="50" y="150" width="1500" height="790" class="panel"/>

  <text x="90" y="205" class="section-title">1. 用户与 Telegram 入口</text>
  <rect x="90" y="230" width="250" height="140" class="box-blue"/>
  <text x="118" y="270" class="box-title">Telegram 用户</text>
  <text x="118" y="300" class="box-text">- owner 发送命令或普通消息</text>
  <text x="118" y="324" class="box-text">- 可输入自然语言定时任务</text>
  <text x="118" y="348" class="box-text">- 接收 Claude 回复与定时提醒</text>

  <rect x="390" y="220" width="330" height="160" class="box-blue"/>
  <text x="418" y="260" class="box-title">Telegram Application / Handler</text>
  <text x="418" y="290" class="box-text">- /start /reset /memory /remember</text>
  <text x="418" y="314" class="box-text">- /schedule_in /tasks /cancel</text>
  <text x="418" y="338" class="box-text">- handle_message 先判断 owner</text>
  <text x="418" y="362" class="box-text">- 先尝试解析自然语言定时，再决定是否进入 Agent</text>

  <path d="M340 300 H390" class="edge"/>
  <text x="356" y="288" class="edge-label">消息 / 命令</text>

  <text x="90" y="438" class="section-title">2. Agent 核心执行层</text>
  <rect x="90" y="468" width="630" height="210" class="box-green"/>
  <text x="118" y="508" class="box-title">run_agent() / ask_claude()</text>
  <text x="118" y="540" class="box-text">- 使用 ClaudeAgentOptions 组装整个运行环境</text>
  <text x="118" y="564" class="box-text">- 注入 system prompt、长期记忆、内置工具、自定义工具</text>
  <text x="118" y="588" class="box-text">- 通过 make_prompt_stream 适配 can_use_tool 所需的流式 prompt</text>
  <text x="118" y="612" class="box-text">- 通过 hooks 显性展示 Tool Start / Done / Failed</text>
  <text x="118" y="636" class="box-text">- 处理最终 ResultMessage，并在结束后落盘对话记录</text>

  <rect x="760" y="468" width="300" height="210" class="box-green"/>
  <text x="788" y="508" class="box-title">AGENT_LOCK 全局锁</text>
  <text x="788" y="540" class="box-text">- 普通消息与定时任务共用一把锁</text>
  <text x="788" y="564" class="box-text">- 避免多个 Agent 并发运行</text>
  <text x="788" y="588" class="box-text">- 更适合课程演示与问题排查</text>
  <text x="788" y="612" class="box-text">- 保证工具执行顺序清晰</text>

  <path d="M555 380 V468" class="edge"/>
  <text x="570" y="430" class="edge-label">普通消息</text>
  <path d="M720 573 H760" class="edge"/>
  <text x="726" y="558" class="edge-label">串行化</text>

  <text x="1110" y="205" class="section-title">3. Session 与长期记忆</text>
  <rect x="1110" y="230" width="390" height="170" class="box-yellow"/>
  <text x="1138" y="270" class="box-title">Session / Memory 层</text>
  <text x="1138" y="302" class="box-text">- course_session.json：保存 session_id，支持连续会话</text>
  <text x="1138" y="326" class="box-text">- CLAUDE.md：保存长期稳定记忆</text>
  <text x="1138" y="350" class="box-text">- conversations/YYYY-MM-DD.jsonl：按天保存原始对话记录</text>
  <text x="1138" y="374" class="box-text">- /reset 清 session，不清长期记忆</text>

  <path d="M720 573 C890 573, 930 380, 1110 320" class="edge"/>
  <text x="896" y="468" class="edge-label">读 / 写状态</text>

  <text x="1110" y="438" class="section-title">4. 工具层</text>
  <rect x="1110" y="468" width="390" height="210" class="box-purple"/>
  <text x="1138" y="508" class="box-title">Claude 工具系统</text>
  <text x="1138" y="540" class="box-text">内置工具：</text>
  <text x="1164" y="564" class="box-text">- Read / Write / Edit / Glob / Grep / Bash / WebFetch</text>
  <text x="1138" y="594" class="box-text">自定义工具：</text>
  <text x="1164" y="618" class="box-text">- get_current_time</text>
  <text x="1164" y="642" class="box-text">- list_workspace_files</text>
  <text x="1164" y="666" class="box-text">- read_workspace_file / send_message</text>

  <path d="M1060 573 H1110" class="edge"/>
  <text x="1068" y="558" class="edge-label">工具调用</text>

  <text x="90" y="735" class="section-title">5. 定时任务系统</text>
  <rect x="90" y="765" width="470" height="140" class="box-red"/>
  <text x="118" y="805" class="box-title">自然语言解析 + 任务存库</text>
  <text x="118" y="837" class="box-text">- 解析“30秒后… / 今晚8点… / 每天下午3点… / 每周一早上9点…”</text>
  <text x="118" y="861" class="box-text">- 统一转成 ParsedSchedule</text>
  <text x="118" y="885" class="box-text">- 写入 course_tasks.db</text>

  <rect x="610" y="745" width="420" height="160" class="box-red"/>
  <text x="638" y="785" class="box-title">AsyncIOScheduler</text>
  <text x="638" y="817" class="box-text">- 固定间隔扫描到点任务</text>
  <text x="638" y="841" class="box-text">- check_due_tasks() 取出 active 且已到点的任务</text>
  <text x="638" y="865" class="box-text">- execute_scheduled_task() 复用同一套 Agent 执行链路</text>
  <text x="638" y="889" class="box-text">- 单次任务完成后结束；daily / weekly 自动排下一次</text>

  <rect x="1080" y="745" width="420" height="160" class="box-red"/>
  <text x="1108" y="785" class="box-title">SQLite 持久化</text>
  <text x="1108" y="817" class="box-text">- course_tasks.db 保存 scheduled_tasks</text>
  <text x="1108" y="841" class="box-text">- next_run 控制下一次触发时间</text>
  <text x="1108" y="865" class="box-text">- status 表示 active / completed / cancelled</text>
  <text x="1108" y="889" class="box-text">- last_result 保存最近一次执行结果</text>

  <path d="M555 300 C665 300, 760 300, 760 468" class="edge-dashed"/>
  <text x="652" y="286" class="edge-label">普通对话</text>

  <path d="M555 380 C555 600, 320 600, 320 765" class="edge"/>
  <text x="336" y="650" class="edge-label">自然语言定时解析</text>

  <path d="M560 835 H610" class="edge"/>
  <text x="566" y="822" class="edge-label">创建任务</text>

  <path d="M1030 825 H1080" class="edge"/>
  <text x="1038" y="812" class="edge-label">读写任务</text>

  <path d="M820 745 C820 700, 840 690, 900 678" class="edge"/>
  <text x="836" y="706" class="edge-label">定时触发后复用 Agent</text>

  <path d="M1260 678 V745" class="edge-dashed"/>
  <text x="1272" y="714" class="edge-label">工具执行 / 状态回写</text>

  <path d="M1305 400 V468" class="edge-dashed"/>
  <text x="1320" y="438" class="edge-label">长期记忆注入</text>

  <path d="M1340 678 V745" class="edge-dashed"/>
  <text x="1354" y="716" class="edge-label">任务结果记录</text>

  <rect x="1190" y="84" width="320" height="26" rx="13" fill="#ffffff" opacity="0.16"/>
  <text x="1206" y="102" class="small-text" fill="#eaf7fb">课程版入口文件：claw_course_bot.py</text>
</svg>
